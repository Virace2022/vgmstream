name: pages-demo

on:
  push:
    branches: [ master ]
    paths:
      - 'web/pages/**'
      - 'make-build-pages-demo.sh'
      - 'preview-pages-demo.sh'
      - '.github/workflows/pages-demo.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GH_REPO: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Resolve latest wasm-min release
        id: release_meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh api "repos/$GH_REPO/releases?per_page=20" --jq '.[] | select(.draft == false and (.tag_name | startswith("wasm-min-"))) | .tag_name' | head -n1)
          if [ -z "$tag" ]; then
            echo "No wasm-min release found" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download latest wasm-min release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.temp/release-assets"
          gh release download "${{ steps.release_meta.outputs.tag }}" \
            --repo "$GH_REPO" \
            --dir "$GITHUB_WORKSPACE/.temp/release-assets" \
            --pattern "vgmstream_wasm_min.js" \
            --pattern "vgmstream_wasm_min.wasm" \
            --pattern "vgmstream_wasm_min.wasm.gz"

      - name: Build Pages demo site
        shell: bash
        run: |
          WASM_ASSET_DIR="$GITHUB_WORKSPACE/.temp/release-assets" \
          sh ./make-build-pages-demo.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ github.workspace }}/.temp/pages-demo-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
