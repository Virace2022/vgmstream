name: wasm-min build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'doc/**'
      - '**.md'
      - 'COPYING'
      - '.gitignore'
      - 'cli/tools/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  EM_VERSION: 3.1.74
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build wasm-min
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}
      short_sha: ${{ steps.release_meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "tag=wasm-min-$short_sha" >> "$GITHUB_OUTPUT"

      - name: Setup emsdk
        uses: pyodide/setup-emsdk@v15
        with:
          version: ${{ env.EM_VERSION }}

      - name: Cache ogg
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/dependencies/ogg
          key: wasm-min-ogg-${{ hashFiles('cmake/dependencies/ogg.cmake') }}

      - name: Cache vorbis
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/dependencies/vorbis
          key: wasm-min-vorbis-${{ hashFiles('cmake/dependencies/vorbis.cmake') }}

      - name: Verify emsdk environment
        shell: bash
        run: |
          which emcmake
          which emcc
          emcc --version

      - name: Build wasm-min
        shell: bash
        env:
          VERSION: ${{ steps.release_meta.outputs.short_sha }}
        run: |
          BUILD_DIR="$GITHUB_WORKSPACE/.temp/build-wasm-min-gh" \
          FETCHCONTENT_UPDATES_DISCONNECTED=OFF \
          JOBS=3 \
          bash ./make-build-wasm-min.sh

      - name: Compress wasm
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/.temp/build-wasm-min-gh/cli"
          gzip -c vgmstream_wasm_min.wasm > vgmstream_wasm_min.wasm.gz

      - name: Publish size summary
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/.temp/build-wasm-min-gh/cli"
          js_size=$(stat -c%s vgmstream_wasm_min.js)
          wasm_size=$(stat -c%s vgmstream_wasm_min.wasm)
          gzip_size=$(stat -c%s vgmstream_wasm_min.wasm.gz)
          {
            echo "## wasm-min build"
            echo ""
            echo "| Artifact | Size (bytes) |"
            echo "| --- | ---: |"
            echo "| vgmstream_wasm_min.js | $js_size |"
            echo "| vgmstream_wasm_min.wasm | $wasm_size |"
            echo "| vgmstream_wasm_min.wasm.gz | $gzip_size |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload wasm-min artifact
        uses: actions/upload-artifact@v7
        with:
          name: vgmstream-wasm-min
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/.temp/build-wasm-min-gh/cli/vgmstream_wasm_min.js
            ${{ github.workspace }}/.temp/build-wasm-min-gh/cli/vgmstream_wasm_min.wasm
            ${{ github.workspace }}/.temp/build-wasm-min-gh/cli/vgmstream_wasm_min.wasm.gz

      - name: Publish wasm-min release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SHORT_SHA: ${{ steps.release_meta.outputs.short_sha }}
        run: |
          release_title="wasm-min $SHORT_SHA"
          notes_file="$(mktemp)"
          {
            echo "Automated wasm-min build for commit $GITHUB_SHA."
            echo ""
            echo "- Version: $SHORT_SHA"
            echo "- Source commit: $GITHUB_SHA"
          } > "$notes_file"

          assets=(
            "$GITHUB_WORKSPACE/.temp/build-wasm-min-gh/cli/vgmstream_wasm_min.js"
            "$GITHUB_WORKSPACE/.temp/build-wasm-min-gh/cli/vgmstream_wasm_min.wasm"
            "$GITHUB_WORKSPACE/.temp/build-wasm-min-gh/cli/vgmstream_wasm_min.wasm.gz"
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "$release_title" \
              --notes-file "$notes_file" \
              --latest=false \
              --prerelease
          fi
